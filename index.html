<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>তালিখাতা</title>
  <meta name="theme-color" content="#c8102e">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">

  <!-- HOME -->
  <section id="homeScreen" class="screen active">

    <header class="topbar red">
      <div class="topbar-row">
        <button class="account-btn">
          <span>আমার ব্যবসা</span>
          <span>▼</span>
        </button>

        <div class="top-icons">
          <button title="Settings">⚙</button>
        </div>
      </div>

      <div class="dashboard-title">ড্যাশবোর্ড</div>
    </header>

    <section class="summary-box">
      <div>
        <h3 id="totalReceive">০</h3>
        <p>মোট পাবো</p>
      </div>

      <div class="divider"></div>

      <div>
        <h3 id="totalGive">০</h3>
        <p>মোট দেবো</p>
      </div>
    </section>

    <section class="search-row">
      <input
        id="searchInput"
        type="text"
        placeholder="কাস্টমার খুঁজুন"
      >
    </section>

    <section class="customer-meta">
      <span>কাস্টমার <span id="customerCount">০</span></span>
      <span class="meta-right">পাবো / দেবো</span>
    </section>

    <section id="customerList" class="customer-list"></section>

    <button id="openCustomerModal" class="fab">＋</button>

    <nav class="bottom-nav">
      <button class="active">হিসাব</button>
      <button>রিপোর্ট</button>
      <button>ব্যাকআপ</button>
      <button>মেনু</button>
    </nav>

  </section>


  <!-- ADD CUSTOMER -->
  <section id="customerFormScreen" class="screen">

    <header class="simple-header">
      <button id="backFromCustomerForm">←</button>
      <h2>নতুন কাস্টমার</h2>
    </header>

    <div class="form-wrap">
      <input id="customerName" type="text" placeholder="নাম">
      <input id="customerPhone" type="text" placeholder="মোবাইল নম্বর">
      <input id="customerOpening" type="number" placeholder="আগের বাকি">

      <button id="saveCustomerBtn" class="primary-btn">
        সেভ করুন
      </button>
    </div>

  </section>


  <!-- LEDGER -->
  <section id="ledgerScreen" class="screen">

    <header class="simple-header">
      <button id="backToHome">←</button>

      <div class="ledger-user">
        <div id="ledgerAvatar" class="avatar">A</div>

        <div>
          <h2 id="ledgerName">Customer</h2>
          <small>
            বর্তমান বাকি:
            <span id="ledgerBalance">০</span>
          </small>
        </div>
      </div>

      <button id="deleteCustomerBtn">🗑</button>
    </header>

    <div class="ledger-top-balance">
      বাকি: <span id="ledgerTopBalance">০</span>
    </div>

    <div class="transaction-form">
      <input
        id="txnGive"
        type="number"
        placeholder="দিলাম / বেচা"
      >

      <input
        id="txnReceive"
        type="number"
        placeholder="পেলাম"
      >

      <textarea
        id="txnNote"
        placeholder="বিবরণ"
      ></textarea>

      <button id="saveTxnBtn" class="primary-btn">
        লেনদেন সেভ করুন
      </button>
    </div>

    <div id="transactionList" class="transaction-list"></div>

  </section>

</div>

<script src="db.js"></script>
<script src="app.js"></script>

</body>
</html>
